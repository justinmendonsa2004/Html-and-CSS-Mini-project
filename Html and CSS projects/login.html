<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log IN</title>
    <link
      rel="stylesheet"
      href="/Html and CSS projects/login page/style/style.css"
    />
  </head>
  <body>
    <div class="main">
      <form action="">
        <div class="headerDiv">
          <h2>Login</h2>
        </div>
        <div class="inputdivs">
          <label for="username">Username:</label>
          <input
            type="text"
            name="username"
            id="username"
            class="input"
            placeholder="Enter your username"
          />
        </div>
        <div class="inputdivs">
          <label for="password">Password:</label>
          <input
            type="password"
            name="password"
            id="password"
            class="input"
            placeholder="Enter your password"
          />
        </div>
        <div class="inputdivs">
          <input type="submit" id="submit" />
        </div>
        <div><a href="forgot password">Forgot password</a></div>
      </form>
    </div>
  </body>
</html>
